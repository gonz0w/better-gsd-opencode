name: "bGSD Security Config"
disable-default-queries: false

paths-ignore:
  - bin/bgsd-tools.cjs
  - node_modules/**
  - .planning/**
  - "**/*.test.js"
  - "**/*.spec.js"
  - src/lib/codebase-intel.js
  - src/plugin/logger.js
  - src/commands/verify.js

queries:
  - uses: security-extended
  - exclude:
      js/file-system-race
